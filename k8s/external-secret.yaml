apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: db-credentials-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_USER
      remoteRef:
        key: prod/python-app/db-credentials
        property: DB_USER
    - secretKey: DB_PASSWORD
      remoteRef:
        key: prod/python-app/db-credentials
        property: DB_PASSWORD